<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <radialGradient id="rcsOrb" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#fda4af"/>
      <stop offset="0.55" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </radialGradient>
  </defs>

  <!-- mark: N candidate responses on a radial layout; consensus cluster selected -->
  <g transform="translate(108,110)">
    <!-- radial frame -->
    <circle r="80" fill="none" stroke="#e2e8f0" stroke-width="2"/>
    <circle r="44" fill="none" stroke="#eef2f6" stroke-width="2"/>
    <!-- highlighted consensus arc -->
    <path d="M61.3,-51.4 A80,80 0 0 1 69.3,40" fill="none"
          stroke="url(#rcsOrb)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>

    <!-- outlier spokes + candidates (low consensus) -->
    <g stroke="#cbd5e1" stroke-width="2.5" stroke-dasharray="2 6" stroke-linecap="round">
      <line x1="0" y1="0" x2="-42" y2="-46"/>
      <line x1="0" y1="0" x2="-60" y2="12"/>
      <line x1="0" y1="0" x2="-16" y2="54"/>
    </g>
    <g fill="#94a3b8" opacity="0.55">
      <circle cx="-42" cy="-46" r="6"/>
      <circle cx="-60" cy="12" r="6"/>
      <circle cx="-16" cy="54" r="6"/>
    </g>

    <!-- consensus spokes + candidates (high agreement) -->
    <g stroke="#7c3aed" stroke-width="3" stroke-linecap="round" opacity="0.5">
      <line x1="0" y1="0" x2="30" y2="-2"/>
      <line x1="0" y1="0" x2="46" y2="-32"/>
      <line x1="0" y1="0" x2="52" y2="22"/>
      <line x1="0" y1="0" x2="66" y2="-6"/>
    </g>
    <g fill="url(#rcsOrb)">
      <circle cx="30" cy="-2" r="6.5"/>
      <circle cx="46" cy="-32" r="7.5"/>
      <circle cx="52" cy="22" r="7.5"/>
    </g>

    <!-- selected best-of-N response -->
    <circle cx="66" cy="-6" r="18" fill="url(#rcsOrb)" opacity="0.18"/>
    <circle cx="66" cy="-6" r="12" fill="url(#rcsOrb)"/>
    <circle cx="66" cy="-6" r="12" fill="none" stroke="#7c3aed" stroke-width="2.5"/>

    <!-- aggregated consensus score at the center -->
    <circle r="9" fill="#1e293b"/>
    <circle r="3" fill="#fbbf24"/>
  </g>

  <!-- wordmark -->
  <text x="210" y="118" font-size="78" font-weight="800" fill="#1e293b" letter-spacing="2">RCS</text>
  <text x="212" y="150" font-size="18.5" font-weight="600" fill="#7c3aed" letter-spacing="0.5">Radial Consensus Score</text>
  <text x="212" y="172" font-size="13.5" font-weight="500" fill="#64748b" letter-spacing="1.5">EFFICIENT BEST-OF-N SELECTION</text>
</svg>
